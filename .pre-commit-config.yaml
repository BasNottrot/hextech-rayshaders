repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [ "--fix=lf" ]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: ruff check --fix
        types: [ python ]
        pass_filenames: true
        language: system

      - id: ruff-format
        name: ruff format
        entry: ruff format
        types: [ python ]
        pass_filenames: true
        language: system
